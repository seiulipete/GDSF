<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konzertwochenende – Check-in</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: #2a2a3d;
    --accent: #e8c547;
    --accent2: #ff6b35;
    --green: #2ecc71;
    --red: #e74c3c;
    --blue: #4a9eff;
    --text: #f0f0f5;
    --muted: #6b6b8a;
    --vip: #c8a0f0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .logo span { color: var(--text); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .sync-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }

  .sync-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  .sync-dot.syncing { background: var(--accent); animation: spin-dot 1s linear infinite; }
  .sync-dot.error { background: var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* EVENT SELECTOR */
  .event-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .event-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .event-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 4px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .event-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* STATS BAR */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat {
    background: var(--surface);
    padding: 12px 20px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    line-height: 1;
    color: var(--accent);
  }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* SEARCH */
  .search-section {
    padding: 16px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .search-wrap {
    position: relative;
    max-width: 600px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px 12px 42px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }

  .filter-chip {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .filter-chip.active {
    background: var(--surface2);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* GUEST LIST */
  .guest-list {
    padding: 0 24px 80px;
  }

  .list-header {
    display: grid;
    grid-template-columns: 2fr 2fr 1fr 1fr 80px;
    gap: 12px;
    padding: 10px 16px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    margin-top: 16px;
  }

  .guest-item {
    display: grid;
    grid-template-columns: 2fr 2fr 1fr 1fr 80px;
    gap: 12px;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .guest-item:hover { background: var(--surface2); }

  .guest-item.checked-in {
    opacity: 0.55;
  }

  .guest-name {
    font-weight: 500;
    font-size: 15px;
  }

  .guest-firma {
    font-size: 13px;
    color: var(--muted);
  }

  .guest-badges {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge-gl { background: rgba(232,197,71,0.15); color: var(--accent); border: 1px solid rgba(232,197,71,0.3); }
  .badge-vip { background: rgba(200,160,240,0.15); color: var(--vip); border: 1px solid rgba(200,160,240,0.3); }

  .guest-kategorie {
    font-size: 12px;
    color: var(--muted);
  }

  .checkin-status {
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .checkin-status.in { color: var(--green); }
  .checkin-status.out { color: var(--muted); }

  /* CHECK-IN BUTTON */
  .btn-checkin {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 7px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-checkin:hover { background: #f5d060; transform: scale(1.03); }

  .btn-undo {
    background: transparent;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 6px 10px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-undo:hover { background: rgba(231,76,60,0.1); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    min-width: 280px;
    justify-content: center;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }
  .toast.info { border-color: var(--accent); }

  /* SYNC BUTTON */
  .btn-sync {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-sync:hover { border-color: var(--accent); color: var(--accent); }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px;
    gap: 12px;
    color: var(--muted);
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* EMPTY */
  .empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }

  .empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* CONFIRM MODAL */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop.show { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    max-width: 380px;
    width: 90%;
    animation: modalIn 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .modal-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .modal-detail {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .modal-badges { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }

  .modal-info {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.7;
  }

  .modal-info span { color: var(--muted); }

  .modal-actions { display: flex; gap: 10px; }

  .btn-confirm {
    flex: 1;
    background: var(--green);
    color: #000;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-confirm:hover { background: #27ae60; }

  .btn-cancel {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 12px 20px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }

  .btn-cancel:hover { border-color: var(--muted); }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tab {
    padding: 12px 20px;
    font-size: 13px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Sans', sans-serif;
    margin-bottom: -1px;
  }

  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ADMIN PANEL */
  .admin-panel { padding: 24px; }

  .admin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .admin-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }

  .admin-card h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .progress-bar {
    background: var(--border);
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
    margin: 8px 0 4px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  .progress-fill.vip { background: var(--vip); }

  .prog-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
  }

  .btn-export {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-right: 8px;
  }

  .btn-export:hover { border-color: var(--accent); color: var(--accent); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .list-header, .guest-item {
      grid-template-columns: 1fr 60px;
    }
    .list-header > *:not(:first-child):not(:last-child),
    .guest-item > *:not(:first-child):not(:last-child) {
      display: none;
    }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    header { padding: 12px 16px; }
    .search-section { padding: 12px 16px; }
    .guest-list { padding: 0 16px 80px; }
  }

  .realtime-badge {
    font-size: 10px;
    background: rgba(46,204,113,0.15);
    color: var(--green);
    border: 1px solid rgba(46,204,113,0.3);
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.5px;
  }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--accent); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Konzert<span>wochenende</span></div>
  <div class="header-right">
    <span class="realtime-badge">● LIVE</span>
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">Verbunden</span>
    </div>
    <button class="btn-sync" onclick="syncFromSheets()">↻ Sync</button>
  </div>
</header>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('checkin')">Check-in</button>
  <button class="tab" onclick="switchTab('admin')">Admin</button>
</div>

<!-- CHECK-IN TAB -->
<div id="tab-checkin">
  <!-- EVENT SELECTOR -->
  <div class="event-bar">
    <span class="event-label">Event:</span>
    <div id="eventButtons"></div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="statTotal">–</div>
      <div class="stat-label">Gesamt</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statChecked">–</div>
      <div class="stat-label">Eingecheckt</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statVip">–</div>
      <div class="stat-label">VIP</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="statGL">–</div>
      <div class="stat-label">Gästeliste</div>
    </div>
  </div>

  <!-- SEARCH & FILTER -->
  <div class="search-section">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Name, Firma, Kategorie suchen…" oninput="renderList()">
    </div>
    <div class="filter-row">
      <button class="filter-chip active" onclick="setFilter('all', this)">Alle</button>
      <button class="filter-chip" onclick="setFilter('pending', this)">Noch nicht da</button>
      <button class="filter-chip" onclick="setFilter('checked', this)">Eingecheckt</button>
      <button class="filter-chip" onclick="setFilter('vip', this)">VIP</button>
      <button class="filter-chip" onclick="setFilter('gl', this)">Gästeliste</button>
    </div>
  </div>

  <!-- GUEST LIST -->
  <div class="guest-list">
    <div class="list-header">
      <span>Name</span>
      <span>Firma / Kategorie</span>
      <span>Badges</span>
      <span>Status</span>
      <span>Aktion</span>
    </div>
    <div id="guestListContainer">
      <div class="loading"><div class="spinner"></div> Lade Gäste…</div>
    </div>
  </div>
</div>

<!-- ADMIN TAB -->
<div id="tab-admin" style="display:none;">
  <div class="admin-panel">
    <h2 style="font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--accent); margin-bottom:20px;">Admin Panel</h2>

    <div class="admin-grid">
      <div class="admin-card">
        <h3>Check-in Fortschritt</h3>
        <div id="adminProgress">
          <div class="prog-label"><span>Gesamt</span><span id="ap-total">–</span></div>
          <div class="progress-bar"><div class="progress-fill" id="ap-bar" style="width:0%"></div></div>
          <div class="prog-label"><span>Eingecheckt</span><span id="ap-checked">–</span></div>
          <br>
          <div class="prog-label"><span>VIP</span><span id="ap-vip">–</span></div>
          <div class="progress-bar"><div class="progress-fill vip" id="ap-vip-bar" style="width:0%"></div></div>
          <div class="prog-label"><span id="ap-vip-checked">–</span><span>eingecheckt</span></div>
        </div>
      </div>

      <div class="admin-card">
        <h3>Kategorien</h3>
        <div id="adminKategorien" style="font-size:13px; line-height:2;"></div>
      </div>
    </div>

    <div>
      <button class="btn-export" onclick="exportCSV()">⬇ CSV Export</button>
      <button class="btn-export" onclick="syncFromSheets()">↻ Sync von Google Sheets</button>
      <button class="btn-export" onclick="pushAllToSheets()">↑ Alle Daten → Sheets</button>
    </div>

    <div style="margin-top:24px; font-size:12px; color:var(--muted);">
      <strong style="color:var(--text);">Google Sheet:</strong>
      <a href="https://docs.google.com/spreadsheets/d/1hBhtL9iBaxg8P62D1zGJm5beJSvccCy3USfWU9M3LK0/edit" 
         target="_blank" style="color:var(--accent); text-decoration:none;">
        Gästeliste-2026 ↗
      </a>
    </div>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-name" id="modalName"></div>
    <div class="modal-detail" id="modalDetail"></div>
    <div class="modal-badges" id="modalBadges"></div>
    <div class="modal-info" id="modalInfo"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="btn-confirm" id="modalConfirmBtn" onclick="confirmCheckIn()">✓ Check-in bestätigen</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = 'https://xdgufsqaplekmxuiubhu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZ3Vmc3FhcGxla214dWl1Ymh1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTIzNjcsImV4cCI6MjA5MjQyODM2N30.SDA1FaWNT-jHPepYBtEYG62VqTvimvO8kmqUV24BNsI';
const SHEETS_API_KEY = 'AIzaSyA-YQ6yibbvwvKwzqEdKDfhcFqwkmcyCb8';
const SHEET_ID = '1hBhtL9iBaxg8P62D1zGJm5beJSvccCy3USfWU9M3LK0';
const SHEET_NAME = 'Tabelle1'; // Default sheet name - adjust if needed

// ============================================================
// STATE
// ============================================================
let guests = [];
let events = [];
let currentEventId = null;
let currentFilter = 'all';
let pendingGuest = null;
let realtimeChannel = null;
let staffName = localStorage.getItem('staffName') || 'Doorstaff';

// ============================================================
// SUPABASE HELPERS
// ============================================================
async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
      ...options.headers
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : [];
}

// ============================================================
// LOAD EVENTS
// ============================================================
async function loadEvents() {
  try {
    events = await sbFetch('events?select=*&order=created_at');
    renderEventButtons();
    if (events.length > 0) {
      selectEvent(events[0].id);
    }
  } catch (e) {
    // If no events table or no events, try loading guests directly
    console.warn('Events table issue:', e);
    loadGuestsDirect();
  }
}

function renderEventButtons() {
  const container = document.getElementById('eventButtons');
  container.innerHTML = events.map(ev => `
    <button class="event-btn ${currentEventId === ev.id ? 'active' : ''}" 
            onclick="selectEvent('${ev.id}')">
      ${ev.name || ev.id.substring(0,8)}
    </button>
  `).join('');
}

function selectEvent(id) {
  currentEventId = id;
  renderEventButtons();
  loadGuests();
}

// ============================================================
// LOAD GUESTS FROM SUPABASE
// ============================================================
async function loadGuests() {
  setSyncStatus('syncing');
  try {
    let query = 'guests?select=*&order=nachname,vorname';
    if (currentEventId) {
      query += `&event_id=eq.${currentEventId}`;
    }
    guests = await sbFetch(query);
    renderList();
    updateStats();
    updateAdminPanel();
    setSyncStatus('connected');
  } catch (e) {
    setSyncStatus('error');
    showToast('❌ Fehler beim Laden: ' + e.message, 'error');
  }
}

async function loadGuestsDirect() {
  setSyncStatus('syncing');
  try {
    guests = await sbFetch('guests?select=*&order=nachname,vorname');
    // Get unique event IDs
    const eventIds = [...new Set(guests.map(g => g.event_id).filter(Boolean))];
    if (eventIds.length > 0 && events.length === 0) {
      events = eventIds.map(id => ({ id, name: 'Event ' + id.substring(0, 8) }));
      currentEventId = eventIds[0];
      renderEventButtons();
    }
    renderList();
    updateStats();
    updateAdminPanel();
    setSyncStatus('connected');
  } catch (e) {
    setSyncStatus('error');
    showToast('❌ Fehler: ' + e.message, 'error');
  }
}

// ============================================================
// GOOGLE SHEETS SYNC
// ============================================================

// Read from Google Sheets and update Supabase
async function syncFromSheets() {
  setSyncStatus('syncing');
  showToast('⏳ Synchronisiere mit Google Sheets…', 'info');

  try {
    const range = `${SHEET_NAME}!A:M`;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${SHEETS_API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!data.values || data.values.length < 2) {
      showToast('ℹ️ Keine Daten im Sheet gefunden', 'info');
      setSyncStatus('connected');
      return;
    }

    const headers = data.values[0].map(h => h.toLowerCase().trim());
    const rows = data.values.slice(1);

    let updated = 0;
    let added = 0;

    for (const row of rows) {
      const rowObj = {};
      headers.forEach((h, i) => { rowObj[h] = row[i] || ''; });

      if (!rowObj.id) continue;

      const existingGuest = guests.find(g => g.id === rowObj.id);

      const guestData = {
        id: rowObj.id,
        event_id: rowObj.event_id,
        gl: rowObj.gl === 'TRUE' || rowObj.gl === 'true',
        vip: rowObj.vip === 'TRUE' || rowObj.vip === 'true',
        vorname: rowObj.vorname || '',
        nachname: rowObj.nachname || '',
        firma: rowObj.firma || '',
        kategorie: rowObj.kategorie || '',
        notiz: rowObj.notiz || '',
        checked_in: rowObj.checked_in === 'TRUE' || rowObj.checked_in === 'true',
        checked_in_at: rowObj.checked_in_at || null,
        checked_in_by: rowObj.checked_in_by || null,
      };

      if (!existingGuest) {
        // New guest - insert
        await sbFetch('guests', {
          method: 'POST',
          body: JSON.stringify(guestData)
        });
        added++;
      } else {
        // Existing - update only non-checkin fields (don't overwrite checkins)
        await sbFetch(`guests?id=eq.${rowObj.id}`, {
          method: 'PATCH',
          body: JSON.stringify({
            vorname: guestData.vorname,
            nachname: guestData.nachname,
            firma: guestData.firma,
            kategorie: guestData.kategorie,
            notiz: guestData.notiz,
            gl: guestData.gl,
            vip: guestData.vip,
          })
        });
        updated++;
      }
    }

    await loadGuests();
    showToast(`✅ Sync: ${added} neu, ${updated} aktualisiert`, 'success');
  } catch (e) {
    setSyncStatus('error');
    showToast('❌ Sheets Sync Fehler: ' + e.message, 'error');
  }
}

// Write check-in status back to Google Sheets
async function updateSheetCheckin(guest) {
  try {
    // First, find the row number of this guest in the sheet
    const range = `${SHEET_NAME}!A:A`;
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?key=${SHEETS_API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();

    if (!data.values) return;

    const rowIndex = data.values.findIndex(row => row[0] === guest.id);
    if (rowIndex === -1) return;

    const sheetRow = rowIndex + 1; // 1-indexed

    // Update checked_in (col J = 10), checked_in_at (col K = 11), checked_in_by (col L = 12)
    const updateRange = `${SHEET_NAME}!J${sheetRow}:L${sheetRow}`;
    const updateUrl = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(updateRange)}?valueInputOption=USER_ENTERED&key=${SHEETS_API_KEY}`;

    await fetch(updateUrl, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        range: updateRange,
        majorDimension: 'ROWS',
        values: [[
          guest.checked_in ? 'TRUE' : 'FALSE',
          guest.checked_in_at || '',
          guest.checked_in_by || ''
        ]]
      })
    });
  } catch (e) {
    console.warn('Sheets update failed (non-critical):', e);
  }
}

// Push all current data to Sheets
async function pushAllToSheets() {
  showToast('⏳ Schreibe alle Check-ins ins Sheet…', 'info');
  try {
    const checkedIn = guests.filter(g => g.checked_in);
    let count = 0;
    for (const g of checkedIn) {
      await updateSheetCheckin(g);
      count++;
    }
    showToast(`✅ ${count} Check-ins ins Sheet geschrieben`, 'success');
  } catch (e) {
    showToast('❌ Fehler: ' + e.message, 'error');
  }
}

// ============================================================
// REALTIME
// ============================================================
function setupRealtime() {
  // Supabase Realtime via WebSocket
  const wsUrl = SUPABASE_URL.replace('https://', 'wss://') + '/realtime/v1/websocket?vsn=1.0.0&apikey=' + SUPABASE_KEY;
  
  try {
    const ws = new WebSocket(wsUrl);
    
    ws.onopen = () => {
      ws.send(JSON.stringify({
        topic: 'realtime:public:guests',
        event: 'phx_join',
        payload: {},
        ref: '1'
      }));
    };

    ws.onmessage = (msg) => {
      try {
        const data = JSON.parse(msg.data);
        if (data.event === 'INSERT' || data.event === 'UPDATE' || data.event === 'DELETE') {
          loadGuests();
        }
      } catch (e) {}
    };

    ws.onerror = () => setSyncStatus('error');
    ws.onclose = () => {
      setSyncStatus('error');
      setTimeout(setupRealtime, 5000);
    };
  } catch (e) {
    console.warn('Realtime WS failed:', e);
  }
}

// ============================================================
// CHECK-IN LOGIC
// ============================================================
function openCheckIn(guest) {
  pendingGuest = guest;

  document.getElementById('modalName').textContent = `${guest.vorname} ${guest.nachname}`;
  document.getElementById('modalDetail').textContent = guest.firma || guest.kategorie || '–';

  let badges = '';
  if (guest.gl) badges += '<span class="badge badge-gl">GL</span>';
  if (guest.vip) badges += '<span class="badge badge-vip">VIP</span>';
  document.getElementById('modalBadges').innerHTML = badges;

  let info = '';
  if (guest.kategorie) info += `<span>Kategorie:</span> ${guest.kategorie}<br>`;
  if (guest.notiz) info += `<span>Notiz:</span> ${guest.notiz}<br>`;
  if (!info) info = '<span>Keine weiteren Infos</span>';
  document.getElementById('modalInfo').innerHTML = info;

  document.getElementById('modalBackdrop').classList.add('show');
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('show');
  pendingGuest = null;
}

async function confirmCheckIn() {
  if (!pendingGuest) return;
  closeModal();

  const guest = pendingGuest;
  const now = new Date().toISOString();

  try {
    // Update Supabase
    await sbFetch(`guests?id=eq.${guest.id}`, {
      method: 'PATCH',
      body: JSON.stringify({
        checked_in: true,
        checked_in_at: now,
        checked_in_by: staffName
      })
    });

    // Update local state
    const idx = guests.findIndex(g => g.id === guest.id);
    if (idx !== -1) {
      guests[idx].checked_in = true;
      guests[idx].checked_in_at = now;
      guests[idx].checked_in_by = staffName;
    }

    // Update Google Sheets in background
    updateSheetCheckin({ ...guest, checked_in: true, checked_in_at: now, checked_in_by: staffName });

    renderList();
    updateStats();
    updateAdminPanel();
    showToast(`✅ ${guest.vorname} ${guest.nachname} eingecheckt`, 'success');

  } catch (e) {
    showToast('❌ Fehler beim Check-in: ' + e.message, 'error');
  }
}

async function undoCheckIn(guestId) {
  const guest = guests.find(g => g.id === guestId);
  if (!guest) return;

  try {
    await sbFetch(`guests?id=eq.${guestId}`, {
      method: 'PATCH',
      body: JSON.stringify({
        checked_in: false,
        checked_in_at: null,
        checked_in_by: null
      })
    });

    const idx = guests.findIndex(g => g.id === guestId);
    if (idx !== -1) {
      guests[idx].checked_in = false;
      guests[idx].checked_in_at = null;
      guests[idx].checked_in_by = null;
    }

    updateSheetCheckin({ ...guest, checked_in: false, checked_in_at: null, checked_in_by: null });
    renderList();
    updateStats();
    updateAdminPanel();
    showToast(`↩ ${guest.vorname} ${guest.nachname} ausgecheckt`, 'info');

  } catch (e) {
    showToast('❌ Fehler: ' + e.message, 'error');
  }
}

// ============================================================
// RENDER LIST
// ============================================================
function renderList() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const container = document.getElementById('guestListContainer');

  let filtered = guests;

  // Filter by event
  if (currentEventId) {
    filtered = filtered.filter(g => g.event_id === currentEventId);
  }

  // Search
  if (search) {
    filtered = filtered.filter(g =>
      `${g.vorname} ${g.nachname}`.toLowerCase().includes(search) ||
      (g.firma || '').toLowerCase().includes(search) ||
      (g.kategorie || '').toLowerCase().includes(search)
    );
  }

  // Status filter
  if (currentFilter === 'pending') filtered = filtered.filter(g => !g.checked_in);
  if (currentFilter === 'checked') filtered = filtered.filter(g => g.checked_in);
  if (currentFilter === 'vip') filtered = filtered.filter(g => g.vip);
  if (currentFilter === 'gl') filtered = filtered.filter(g => g.gl);

  // Sort: unchecked first, then alphabetical
  filtered.sort((a, b) => {
    if (a.checked_in !== b.checked_in) return a.checked_in ? 1 : -1;
    return `${a.nachname}${a.vorname}`.localeCompare(`${b.nachname}${b.vorname}`);
  });

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div>Keine Gäste gefunden</div>
      </div>`;
    return;
  }

  container.innerHTML = filtered.map(guest => `
    <div class="guest-item ${guest.checked_in ? 'checked-in' : ''}">
      <div class="guest-name">${guest.vorname} ${guest.nachname}</div>
      <div>
        <div style="font-size:13px;">${guest.firma || ''}</div>
        <div class="guest-kategorie">${guest.kategorie || ''}</div>
      </div>
      <div class="guest-badges">
        ${guest.gl ? '<span class="badge badge-gl">GL</span>' : ''}
        ${guest.vip ? '<span class="badge badge-vip">VIP</span>' : ''}
      </div>
      <div class="checkin-status ${guest.checked_in ? 'in' : 'out'}">
        ${guest.checked_in
          ? `✓ ${guest.checked_in_at ? formatTime(guest.checked_in_at) : ''}`
          : '—'}
      </div>
      <div>
        ${guest.checked_in
          ? `<button class="btn-undo" onclick="undoCheckIn('${guest.id}')">Undo</button>`
          : `<button class="btn-checkin" onclick='openCheckIn(${JSON.stringify(guest)})'>Check-in</button>`}
      </div>
    </div>
  `).join('');
}

function formatTime(iso) {
  try {
    return new Date(iso).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}

// ============================================================
// STATS
// ============================================================
function updateStats() {
  const eventGuests = currentEventId ? guests.filter(g => g.event_id === currentEventId) : guests;
  const total = eventGuests.length;
  const checked = eventGuests.filter(g => g.checked_in).length;
  const vip = eventGuests.filter(g => g.vip).length;
  const gl = eventGuests.filter(g => g.gl).length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statChecked').textContent = checked;
  document.getElementById('statVip').textContent = vip;
  document.getElementById('statGL').textContent = gl;
}

function updateAdminPanel() {
  const eventGuests = currentEventId ? guests.filter(g => g.event_id === currentEventId) : guests;
  const total = eventGuests.length;
  const checked = eventGuests.filter(g => g.checked_in).length;
  const vip = eventGuests.filter(g => g.vip).length;
  const vipChecked = eventGuests.filter(g => g.vip && g.checked_in).length;

  document.getElementById('ap-total').textContent = total;
  document.getElementById('ap-checked').textContent = `${checked} / ${total}`;
  document.getElementById('ap-bar').style.width = total > 0 ? `${(checked/total*100).toFixed(0)}%` : '0%';
  document.getElementById('ap-vip').textContent = vip;
  document.getElementById('ap-vip-checked').textContent = `${vipChecked} / ${vip}`;
  document.getElementById('ap-vip-bar').style.width = vip > 0 ? `${(vipChecked/vip*100).toFixed(0)}%` : '0%';

  // Kategorie breakdown
  const cats = {};
  eventGuests.forEach(g => {
    const k = g.kategorie || 'Sonstige';
    if (!cats[k]) cats[k] = { total: 0, checked: 0 };
    cats[k].total++;
    if (g.checked_in) cats[k].checked++;
  });

  document.getElementById('adminKategorien').innerHTML = Object.entries(cats).map(([k, v]) =>
    `<div style="display:flex; justify-content:space-between;">
      <span style="color:var(--muted)">${k}</span>
      <span>${v.checked}/${v.total}</span>
    </div>`
  ).join('');
}

// ============================================================
// UI HELPERS
// ============================================================
function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot';
  if (status === 'syncing') { dot.classList.add('syncing'); text.textContent = 'Sync…'; }
  else if (status === 'error') { dot.classList.add('error'); text.textContent = 'Fehler'; }
  else { text.textContent = 'Verbunden'; }
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function switchTab(tab) {
  document.getElementById('tab-checkin').style.display = tab === 'checkin' ? 'block' : 'none';
  document.getElementById('tab-admin').style.display = tab === 'admin' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'checkin') || (i === 1 && tab === 'admin'));
  });
}

let toastTimer;
function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

function exportCSV() {
  const eventGuests = currentEventId ? guests.filter(g => g.event_id === currentEventId) : guests;
  const headers = ['Vorname', 'Nachname', 'Firma', 'Kategorie', 'GL', 'VIP', 'Eingecheckt', 'Zeit', 'Von'];
  const rows = eventGuests.map(g => [
    g.vorname, g.nachname, g.firma || '', g.kategorie || '',
    g.gl ? 'Ja' : 'Nein', g.vip ? 'Ja' : 'Nein',
    g.checked_in ? 'Ja' : 'Nein',
    g.checked_in_at ? formatTime(g.checked_in_at) : '',
    g.checked_in_by || ''
  ]);
  const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `gaesteliste-${new Date().toISOString().split('T')[0]}.csv`;
  a.click();
  showToast('⬇ CSV exportiert', 'success');
}

// Close modal on backdrop click
document.getElementById('modalBackdrop').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ============================================================
// INIT
// ============================================================
async function init() {
  // Ask for staff name if not set
  if (!localStorage.getItem('staffName')) {
    const name = prompt('Dein Name (für Check-in Protokoll):');
    if (name) {
      staffName = name;
      localStorage.setItem('staffName', name);
    }
  }

  await loadEvents();
  setupRealtime();

  // Auto-refresh every 30 seconds as fallback
  setInterval(loadGuests, 30000);
}

init();
